services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    volumes:
      - ./LavaLink/application.yml:/opt/Lavalink/application.yml:ro
      - ./LavaLink/plugins:/opt/Lavalink/plugins:ro
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c ':> /dev/tcp/localhost/2333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    build: .
    container_name: cleitinrasta-bot
    restart: unless-stopped
    depends_on:
      lavalink:
        condition: service_healthy
    environment:
      - Discord__Token=${DISCORD_TOKEN}
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
